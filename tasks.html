<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voidr - Task Control</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --done: #3fb950;
    --pending: #d29922;
    --blocked: #f85149;
    --doing: #a371f7;
    --watch: #79c0ff;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
  }

  h1 { font-size: 1.6rem; margin-bottom: 4px; }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .client-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .client-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .client-header:hover { opacity: 0.85; }

  .client-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .client-name {
    font-size: 1.1rem;
    font-weight: 600;
    cursor: text;
    border-radius: 3px;
    padding: 0 4px;
  }

  .client-name:focus {
    outline: none;
    background: rgba(88,166,255,0.08);
  }

  .client-header .count {
    font-size: 0.75rem;
    background: var(--border);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 400;
    white-space: nowrap;
  }

  .client-header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-remove-client {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    font-size: 0.8rem;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .client-header:hover .btn-remove-client { opacity: 1; }
  .btn-remove-client:hover { color: var(--blocked); background: rgba(248,81,73,0.1); }

  .chevron {
    transition: transform 0.2s;
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  .client-section.collapsed .chevron { transform: rotate(-90deg); }
  .client-section.collapsed .task-list { display: none; }
  .client-section.collapsed .client-footer { display: none; }

  .task-list { padding: 8px 0; }

  .task-item {
    display: grid;
    grid-template-columns: 78px 1fr auto;
    align-items: start;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }

  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: rgba(255,255,255,0.02); }

  .badge {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 3px 0;
    border-radius: 4px;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    width: 78px;
    text-align: center;
    margin-top: 2px;
    display: inline-block;
  }

  .badge.done { background: rgba(63,185,80,0.15); color: var(--done); }
  .badge.pending { background: rgba(210,153,34,0.15); color: var(--pending); }
  .badge.blocked { background: rgba(248,81,73,0.15); color: var(--blocked); }
  .badge.doing { background: rgba(163,113,247,0.15); color: var(--doing); }
  .badge.watching { background: rgba(121,192,255,0.15); color: var(--watch); }

  .task-content { min-width: 0; }
  .task-title { font-weight: 500; cursor: text; }

  .task-status {
    color: var(--text-muted);
    font-size: 0.82rem;
    margin-top: 2px;
    cursor: text;
  }

  .task-dates {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .task-dates span {
    background: rgba(255,255,255,0.04);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .task-dates .date-done { color: var(--done); background: rgba(63,185,80,0.08); }

  .task-actions { opacity: 0; transition: opacity 0.15s; }
  .task-item:hover .task-actions { opacity: 1; }

  .btn-icon {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 0.85rem;
    border-radius: 4px;
  }

  .btn-icon:hover { color: var(--blocked); background: rgba(248,81,73,0.1); }

  .client-footer {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
  }

  .btn-add {
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.8rem;
    width: 100%;
    text-align: left;
  }

  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  .report-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 24px;
    overflow: hidden;
  }

  .report-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .report-header h2 { font-size: 1.1rem; }

  .btn-copy {
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .btn-copy:hover { opacity: 0.85; }
  .btn-copy.copied { background: var(--done); }

  .report-body {
    padding: 16px;
    white-space: pre-wrap;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
    max-height: 500px;
    overflow-y: auto;
  }

  .status-selector {
    position: absolute;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .status-selector button {
    background: none;
    border: none;
    padding: 6px 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.8rem;
    border-radius: 4px;
    text-align: left;
  }

  .status-selector button:hover { background: rgba(255,255,255,0.06); }

  .add-client-bar {
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }

  .add-client-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 0.85rem;
  }

  .add-client-bar input::placeholder { color: var(--text-muted); }

  .add-client-bar button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .add-client-bar button:hover { opacity: 0.85; }

  [contenteditable]:focus {
    outline: none;
    background: rgba(88,166,255,0.08);
    border-radius: 3px;
    padding: 0 4px;
    margin: 0 -4px;
  }

  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 16px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.08); }

  .sync-indicator {
    text-align: center;
    padding: 12px;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .sync-indicator .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .sync-indicator .dot.synced { background: var(--done); }
  .sync-indicator .dot.local { background: var(--pending); }
</style>
</head>
<body>

<h1>Voidr - Task Control</h1>
<p class="subtitle">Source of truth</p>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="pending">Pending</button>
  <button class="filter-btn" data-filter="doing">Doing</button>
  <button class="filter-btn" data-filter="blocked">Blocked</button>
  <button class="filter-btn" data-filter="watching">Watching</button>
  <button class="filter-btn" data-filter="done">Done</button>
</div>

<div id="app"></div>

<div class="add-client-bar">
  <input type="text" id="newClientInput" placeholder="New client name...">
  <button onclick="addClient()">+ Client</button>
</div>

<div class="report-section">
  <div class="report-header">
    <h2>Daily Report</h2>
    <button class="btn-copy" id="btnCopy" onclick="copyReport()">Copy</button>
  </div>
  <div class="report-body" id="reportOutput"></div>
</div>

<div class="sync-indicator" id="syncIndicator"></div>

<script>
const STATUSES = ['DONE', 'PENDING', 'BLOCKED', 'DOING', 'WATCHING'];

let useApi = false;
let data = [];

function fmtDate(d) {
  if (!d) return null;
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function today() { return new Date().toISOString().slice(0, 10); }

function statusClass(s) { return s ? s.toLowerCase() : 'pending'; }

function migrateStatus(s) {
  const map = { 'PENDENTE': 'PENDING', 'ACOMPANHAMENTO': 'WATCHING' };
  return map[s] || s;
}

function migrateData(arr) {
  if (!Array.isArray(arr)) return [];
  arr.forEach(section => {
    if (!section.tasks) section.tasks = [];
    section.tasks.forEach(t => {
      t.status = migrateStatus(t.status);
      if (!t.createdAt) t.createdAt = today();
      if (t.doneAt === undefined) t.doneAt = t.status === 'DONE' ? today() : null;
    });
  });
  return arr;
}

const DEFAULT_DATA = [];

function updateSyncIndicator() {
  const el = document.getElementById('syncIndicator');
  if (useApi) {
    el.innerHTML = '<span class="dot synced"></span> synced to context.json';
  } else {
    el.innerHTML = '<span class="dot local"></span> local only (localStorage)';
  }
}

async function init() {
  try {
    const res = await fetch('/api/tasks');
    if (res.ok) {
      const remote = await res.json();
      useApi = true;
      data = remote.length ? migrateData(remote) : [];
    } else {
      throw new Error('not ok');
    }
  } catch {
    useApi = false;
    data = loadFromLocal();
  }
  updateSyncIndicator();
  render();
}

function loadFromLocal() {
  const saved = localStorage.getItem('pfb-tasks');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (!Array.isArray(parsed)) throw new Error('invalid');
      return migrateData(parsed);
    } catch {
      localStorage.removeItem('pfb-tasks');
    }
  }
  return [];
}

async function saveToApi() {
  try {
    await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
  } catch { /* silent fail, localStorage is backup */ }
}

function save() {
  localStorage.setItem('pfb-tasks', JSON.stringify(data));
  if (useApi) saveToApi();
}

let activeFilter = 'all';

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  data.forEach((section, ci) => {
    const filtered = activeFilter === 'all'
      ? section.tasks
      : section.tasks.filter(t => statusClass(t.status) === activeFilter);

    const total = section.tasks.length;
    const pending = section.tasks.filter(t => t.status !== 'DONE').length;

    const sec = document.createElement('div');
    sec.className = 'client-section';
    sec.innerHTML = `
      <div class="client-header">
        <div class="client-header-left" onclick="toggleSection(this.parentElement)">
          <span class="client-name" contenteditable="true" onclick="event.stopPropagation()" onblur="updateClientName(${ci}, this)">${section.client}</span>
          <span class="count">${pending} pending / ${total} total</span>
        </div>
        <div class="client-header-right">
          <button class="btn-remove-client" onclick="event.stopPropagation(); removeClient(${ci})" title="Remove client">&times;</button>
          <span class="chevron" onclick="toggleSection(this.closest('.client-header'))">&#9660;</span>
        </div>
      </div>
      <div class="task-list">
        ${filtered.map((t, ti) => {
          const realIdx = section.tasks.indexOf(t);
          return `
          <div class="task-item" data-status="${statusClass(t.status)}">
            <span class="badge ${statusClass(t.status)}" onclick="cycleStatus(${ci}, ${realIdx}, event)">${t.status}</span>
            <div class="task-content">
              <div class="task-title" contenteditable="true" onblur="updateTitle(${ci}, ${realIdx}, this)">${t.title}</div>
              <div class="task-status" contenteditable="true" onblur="updateDetail(${ci}, ${realIdx}, this)">${t.detail}</div>
              <div class="task-dates">
                ${t.createdAt ? `<span>created: ${fmtDate(t.createdAt)}</span>` : ''}
                ${t.doneAt ? `<span class="date-done">done: ${fmtDate(t.doneAt)}</span>` : ''}
              </div>
            </div>
            <div class="task-actions">
              <button class="btn-icon" onclick="removeTask(${ci}, ${realIdx})" title="Remove">&times;</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="client-footer">
        <button class="btn-add" onclick="addTask(${ci})">+ New task</button>
      </div>
    `;
    app.appendChild(sec);
  });

  renderReport();
}

function toggleSection(header) {
  const section = header.closest('.client-section');
  if (section) section.classList.toggle('collapsed');
}

function updateClientName(ci, el) {
  const name = el.textContent.trim();
  if (name) {
    data[ci].client = name;
    save();
    renderReport();
  } else {
    el.textContent = data[ci].client;
  }
}

function removeClient(ci) {
  if (confirm(`Remove "${data[ci].client}" and all its tasks?`)) {
    data.splice(ci, 1);
    save();
    render();
  }
}

function cycleStatus(ci, ti, event) {
  event.stopPropagation();
  const sel = document.createElement('div');
  sel.className = 'status-selector';
  const rect = event.target.getBoundingClientRect();
  sel.style.top = (rect.bottom + 4) + 'px';
  sel.style.left = rect.left + 'px';
  sel.style.position = 'fixed';

  STATUSES.forEach(s => {
    const btn = document.createElement('button');
    btn.innerHTML = `<span class="badge ${statusClass(s)}" style="pointer-events:none">${s}</span>`;
    btn.onclick = () => {
      data[ci].tasks[ti].status = s;
      if (s === 'DONE' && !data[ci].tasks[ti].doneAt) {
        data[ci].tasks[ti].doneAt = today();
      } else if (s !== 'DONE') {
        data[ci].tasks[ti].doneAt = null;
      }
      save();
      render();
      sel.remove();
    };
    sel.appendChild(btn);
  });

  document.body.appendChild(sel);
  const close = (e) => {
    if (!sel.contains(e.target)) { sel.remove(); document.removeEventListener('click', close); }
  };
  setTimeout(() => document.addEventListener('click', close), 0);
}

function updateTitle(ci, ti, el) {
  data[ci].tasks[ti].title = el.textContent.trim();
  save();
  renderReport();
}

function updateDetail(ci, ti, el) {
  data[ci].tasks[ti].detail = el.textContent.trim();
  save();
  renderReport();
}

function addTask(ci) {
  data[ci].tasks.push({ title: 'New task', status: 'PENDING', detail: 'Describe status here...', createdAt: today(), doneAt: null });
  save();
  render();
}

function removeTask(ci, ti) {
  data[ci].tasks.splice(ti, 1);
  save();
  render();
}

function addClient() {
  const input = document.getElementById('newClientInput');
  const name = input.value.trim();
  if (!name) return;
  data.push({ client: name, tasks: [] });
  input.value = '';
  save();
  render();
}

function renderReport() {
  const letters = 'abcdefghijklmnopqrstuvwxyz';
  let output = '';

  data.forEach((section, ci) => {
    output += `${ci + 1}. ${section.client}\n`;
    section.tasks.forEach((t, ti) => {
      output += `    ${letters[ti] || '?'}. [${t.status}] ${t.title}\n`;
      let statusLine = `        i. ${t.detail}`;
      if (t.doneAt) statusLine += ` (done ${fmtDate(t.doneAt)})`;
      output += statusLine + '\n\n';
    });
  });

  document.getElementById('reportOutput').textContent = output.trimEnd();
}

function copyReport() {
  const text = document.getElementById('reportOutput').textContent;
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  const btn = document.getElementById('btnCopy');
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
}

document.getElementById('filterBar').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    render();
  }
});

init();
</script>
</body>
</html>
